resources:
  jobs:
    ETL_FROM_GIT:
      name: ETL_FROM_GIT
      tasks:
        - task_key: bronze
          notebook_task:
            notebook_path: /Workspace/Shared/GitHub/prd/files/src/notebooks/4_Workflows/01_bronze_autoloader
            source: WORKSPACE
        - task_key: gold
          depends_on:
            - task_key: silver
          notebook_task:
            notebook_path: /Workspace/Shared/GitHub/prd/files/src/notebooks/4_Workflows/03_gold_star
            source: WORKSPACE
        - task_key: silver
          depends_on:
            - task_key: bronze
          notebook_task:
            notebook_path: /Workspace/Shared/GitHub/prd/files/src/notebooks/4_Workflows/02_silver_curate
            source: WORKSPACE
      queue:
        enabled: true
      performance_target: PERFORMANCE_OPTIMIZED